server:
  tomcat:
    # At 1000 TPS each POST takes ~2-5 ms → need ~5-10 concurrent threads in steady state.
    # 400 gives safe headroom for bursts without excessive memory cost.
    max-threads: ${SERVER_TOMCAT_MAX_THREADS:400}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:200}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:4000}

spring:
  application:
    name: platform-core
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transactions}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      # HTTP threads (INSERT) + drain scheduler (batch UPDATE) + SlaGuard (bulk UPDATE)
      # + recovery claimBatch = well under 30 connections needed in steady state.
      # 30 gives headroom without putting pressure on PostgreSQL max_connections.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:2000}
      keepalive-time: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

app:
  processing:
    # Max items drained from the in-memory queue per cycle.
    # At 1000 TPS × 10 ms interval = ~10 items/cycle; 500 absorbs any spike.
    batch-size: ${APP_PROCESSING_BATCH_SIZE:500}
    # Drain+finalize cycle interval. 10 ms → max finalization latency ≈ 10 ms (vs 50 ms before).
    poll-interval-ms: ${APP_PROCESSING_POLL_INTERVAL_MS:10}
    max-in-progress: ${APP_PROCESSING_MAX_IN_PROGRESS:25000}
    reclaim-timeout-ms: ${APP_PROCESSING_RECLAIM_TIMEOUT_MS:500}
    # Queue capacity; must be >> maxInProgress so offer() never blocks.
    queue-capacity: ${APP_PROCESSING_QUEUE_CAPACITY:50000}
  sla:
    timeout-ms: ${APP_SLA_TIMEOUT_MS:3000}
    sweeper-interval-ms: ${APP_SLA_SWEEPER_INTERVAL_MS:100}
  metrics:
    refresh-interval-ms: ${APP_METRICS_REFRESH_INTERVAL_MS:1000}
  scheduling:
    enabled: ${APP_SCHEDULING_ENABLED:true}

logging:
  level:
    com.example.platformcore.service.TransactionProcessingService: WARN
