server:
  tomcat:
    # At 1000 TPS each request ~2-5ms → need ~5-10 concurrent threads, but spikes can hit more.
    # 400 threads gives headroom without excessive memory.
    max-threads: ${SERVER_TOMCAT_MAX_THREADS:400}
    # Backlog for incoming connections while all threads are busy
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:200}
    # Keep-alive for generator clients avoids TCP handshake overhead
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:4000}

spring:
  application:
    name: platform-core
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transactions}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      # 32 worker threads + claim + sweep + HTTP threads all need connections.
      # 60 prevents starvation while staying under PG max_connections=200.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:60}
      minimum-idle: ${DB_POOL_MIN_IDLE:20}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:2000}
      # Validate connections quickly to fail fast on stale pool entries
      keepalive-time: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

app:
  processing:
    worker-count: ${APP_PROCESSING_WORKER_COUNT:64}
    batch-size: ${APP_PROCESSING_BATCH_SIZE:500}
    # Poll every 20ms → max ~50ms claim latency (vs 100ms before)
    poll-interval-ms: ${APP_PROCESSING_POLL_INTERVAL_MS:20}
    max-in-progress: ${APP_PROCESSING_MAX_IN_PROGRESS:25000}
    reclaim-timeout-ms: ${APP_PROCESSING_RECLAIM_TIMEOUT_MS:500}
  sla:
    timeout-ms: ${APP_SLA_TIMEOUT_MS:3000}
    sweeper-interval-ms: ${APP_SLA_SWEEPER_INTERVAL_MS:100}
  metrics:
    refresh-interval-ms: ${APP_METRICS_REFRESH_INTERVAL_MS:1000}
  scheduling:
    enabled: ${APP_SCHEDULING_ENABLED:true}

logging:
  level:
    com.example.platformcore.service.TransactionProcessingService: WARN
