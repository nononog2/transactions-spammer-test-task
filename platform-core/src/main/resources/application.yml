spring:
  application:
    name: platform-core
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transactions}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:3000}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

app:
  processing:
    worker-count: ${APP_PROCESSING_WORKER_COUNT:32}
    batch-size: ${APP_PROCESSING_BATCH_SIZE:200}
    poll-interval-ms: ${APP_PROCESSING_POLL_INTERVAL_MS:50}
    max-in-progress: ${APP_PROCESSING_MAX_IN_PROGRESS:25000}
    reclaim-timeout-ms: ${APP_PROCESSING_RECLAIM_TIMEOUT_MS:500}
  sla:
    timeout-ms: ${APP_SLA_TIMEOUT_MS:3000}
    sweeper-interval-ms: ${APP_SLA_SWEEPER_INTERVAL_MS:100}
  metrics:
    refresh-interval-ms: ${APP_METRICS_REFRESH_INTERVAL_MS:1000}
  scheduling:
    enabled: ${APP_SCHEDULING_ENABLED:true}
