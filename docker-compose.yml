version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tst-postgres
    environment:
      POSTGRES_DB: transactions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transactions"]
      interval: 5s
      timeout: 3s
      retries: 10

  platform-core:
    image: eclipse-temurin:21-jre
    container_name: tst-platform-core
    working_dir: /app
    command: ["sh", "-c", "echo 'platform-core skeleton (step 1)'; sleep infinity"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: transactions
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  transaction-generator:
    image: eclipse-temurin:21-jre
    container_name: tst-transaction-generator
    working_dir: /app
    command: ["sh", "-c", "echo 'transaction-generator skeleton (step 1)'; sleep infinity"]
    environment:
      TARGET_URL: http://platform-core:8080
      TARGET_TPS: 1000
    depends_on:
      platform-core:
        condition: service_started

volumes:
  postgres_data:
