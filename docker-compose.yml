version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tst-postgres
    environment:
      POSTGRES_DB: transactions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transactions"]
      interval: 5s
      timeout: 3s
      retries: 10

  platform-core:
    build:
      context: .
      dockerfile: platform-core/Dockerfile
    image: tst-platform-core:local
    container_name: tst-platform-core
    environment:
      GRADLE_USER_HOME: /tmp/gradle-platform-core
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: transactions
      DB_USER: postgres
      DB_PASSWORD: postgres
      APP_SLA_TIMEOUT_MS: 3000
      APP_SLA_SWEEPER_INTERVAL_MS: 100
      APP_PROCESSING_WORKER_COUNT: 32
      APP_PROCESSING_BATCH_SIZE: 200
      APP_PROCESSING_POLL_INTERVAL_MS: 50
      APP_PROCESSING_MAX_IN_PROGRESS: 25000
      APP_PROCESSING_RECLAIM_TIMEOUT_MS: 500
      APP_METRICS_REFRESH_INTERVAL_MS: 1000
      APP_SCHEDULING_ENABLED: true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  transaction-generator:
    build:
      context: .
      dockerfile: transaction-generator/Dockerfile
    image: tst-transaction-generator:local
    container_name: tst-transaction-generator
    environment:
      GRADLE_USER_HOME: /tmp/gradle-transaction-generator
      TARGET_URL: http://platform-core:8080
      TARGET_TPS: 1000
      DURATION_SEC: 30
      CONCURRENCY: 200
      POLL_FINAL_STATUSES: true
      POLL_TIMEOUT_MS: 3500
      POLL_INTERVAL_MS: 50
      SLA_MS: 3000
    depends_on:
      platform-core:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tst-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      platform-core:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.0
    container_name: tst-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
