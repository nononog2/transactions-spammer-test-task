version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tst-postgres
    environment:
      POSTGRES_DB: transactions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # PostgreSQL performance tuning for high-throughput load testing:
    #   synchronous_commit=off  — writes return before WAL flush → 5-10x INSERT/UPDATE
    #                             throughput. Risk: last ~1 ms of committed data lost on
    #                             crash (acceptable for a load test environment).
    #   shared_buffers=256MB    — larger buffer cache, fewer disk reads.
    #   wal_buffers=16MB        — reduce WAL I/O contention under concurrent writes.
    #   work_mem=4MB            — per-sort memory (helps ORDER BY in claimBatch).
    #   max_connections=100     — only ~30 Hikari connections needed; keep headroom low.
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c synchronous_commit=off
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transactions"]
      interval: 5s
      timeout: 3s
      retries: 10

  platform-core:
    build:
      context: .
      dockerfile: platform-core/Dockerfile
    image: tst-platform-core:local
    container_name: tst-platform-core
    healthcheck:
      # Generators use condition: service_healthy so they only start sending
      # traffic once Spring Boot has fully initialized (Flyway migrations done,
      # all beans wired, Tomcat accepting connections).
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s
    environment:
      GRADLE_USER_HOME: /tmp/gradle-platform-core
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: transactions
      DB_USER: postgres
      DB_PASSWORD: postgres
      APP_SLA_TIMEOUT_MS: 3000
      APP_SLA_SWEEPER_INTERVAL_MS: 100
      # Drain cycle: 10 ms → max ~10 ms from INSERT to finalize UPDATE.
      APP_PROCESSING_POLL_INTERVAL_MS: 10
      # Large enough to absorb any burst; at 1000 TPS × 10 ms ≈ 10 items/cycle.
      APP_PROCESSING_BATCH_SIZE: 500
      APP_PROCESSING_MAX_IN_PROGRESS: 25000
      APP_PROCESSING_RECLAIM_TIMEOUT_MS: 500
      # >> maxInProgress so queue.offer() never fails under normal load.
      APP_PROCESSING_QUEUE_CAPACITY: 50000
      APP_SCHEDULING_ENABLED: true
      # Steady-state DB concurrency: ~5 HTTP (INSERT) + 1 drain scheduler + 1 SlaGuard.
      # 30 connections is more than sufficient; saves Docker VM memory vs previous 80.
      DB_POOL_MAX_SIZE: 30
      DB_POOL_MIN_IDLE: 10
      DB_POOL_CONNECTION_TIMEOUT_MS: 2000
      SERVER_TOMCAT_MAX_THREADS: 400
      SERVER_TOMCAT_ACCEPT_COUNT: 200
      SERVER_TOMCAT_MAX_CONNECTIONS: 4000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  # Two generator instances, each firing 500 TPS → 1000 TPS total.
  # Running in separate containers gives each its own Linux network namespace
  # and therefore its own ~28 000 ephemeral ports, preventing BindException
  # that occurs when a single container exhausts the port range under load.
  #
  # sysctls applied to each generator container:
  #   tcp_tw_reuse=1          — allow immediate reuse of TIME_WAIT sockets for
  #                             new outgoing connections (RFC-compliant with
  #                             TCP timestamps, enabled by default on Linux).
  #   ip_local_port_range     — expand the ephemeral range from ~28 k to ~64 k
  #                             ports as an additional safety margin.
  #   tcp_fin_timeout=15      — reduce TIME_WAIT from 60 s to 15 s so ports
  #                             recycle faster under sustained load.
  transaction-generator-1:
    build:
      context: .
      dockerfile: transaction-generator/Dockerfile
    image: tst-transaction-generator:local
    container_name: tst-transaction-generator-1
    environment:
      GRADLE_USER_HOME: /tmp/gradle-transaction-generator
      TARGET_URL: http://platform-core:8080
      TARGET_TPS: 500
      DURATION_SEC: 300
      CONCURRENCY: 200
      POLL_FINAL_STATUSES: true
      POLL_TIMEOUT_MS: 3500
      POLL_INTERVAL_MS: 50
      SLA_MS: 3000
    sysctls:
      net.ipv4.tcp_tw_reuse: "1"
      net.ipv4.ip_local_port_range: "1024 65535"
      net.ipv4.tcp_fin_timeout: "15"
    depends_on:
      platform-core:
        condition: service_healthy

  transaction-generator-2:
    build:
      context: .
      dockerfile: transaction-generator/Dockerfile
    image: tst-transaction-generator:local
    container_name: tst-transaction-generator-2
    environment:
      GRADLE_USER_HOME: /tmp/gradle-transaction-generator
      TARGET_URL: http://platform-core:8080
      TARGET_TPS: 500
      DURATION_SEC: 300
      CONCURRENCY: 200
      POLL_FINAL_STATUSES: true
      POLL_TIMEOUT_MS: 3500
      POLL_INTERVAL_MS: 50
      SLA_MS: 3000
    sysctls:
      net.ipv4.tcp_tw_reuse: "1"
      net.ipv4.ip_local_port_range: "1024 65535"
      net.ipv4.tcp_fin_timeout: "15"
    depends_on:
      platform-core:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tst-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      platform-core:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.0
    container_name: tst-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
